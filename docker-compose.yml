version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mariadb:
    image: mariadb:11
    environment:
      MYSQL_DATABASE: legal_db
      MYSQL_USER: legal
      MYSQL_PASSWORD: legal
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
      - "6334:6334"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - redis
      - mariadb
      - qdrant

  worker:
    build:
      context: ./backend
      dockerfile: worker.Dockerfile
    environment:
      QDRANT_URL: http://qdrant:6333
      CELERY_WORKER_CONCURRENCY: 2
      CELERY_LOGLEVEL: info
    depends_on:
      - redis
      - mariadb
      - qdrant

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - backend
