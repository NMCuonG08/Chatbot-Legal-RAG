version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mariadb:
    image: mariadb:11
    environment:
      MYSQL_DATABASE: legal_db
      MYSQL_USER: legal
      MYSQL_PASSWORD: legal
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
      - "6334:6334"

  # Phase 3 — Neo4j legal knowledge graph. Optional: only needed when
  # NEO4J_URI is set in backend/.env. Best-effort: backend runs without it.
  neo4j:
    image: neo4j:5.20
    environment:
      NEO4J_AUTH: neo4j/neo4j
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - redis
      - mariadb
      - qdrant

  worker:
    build:
      context: ./backend
      dockerfile: worker.Dockerfile
    environment:
      QDRANT_URL: http://qdrant:6333
      CELERY_WORKER_CONCURRENCY: 2
      CELERY_LOGLEVEL: info
    depends_on:
      - redis
      - mariadb
      - qdrant

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:10.0.3
    container_name: grafana
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

