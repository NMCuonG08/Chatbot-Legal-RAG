# ============================================================================
# PROD docker-compose — prebuilt GHCR images + EBS persistent volumes
# ----------------------------------------------------------------------------
# Khác bản dev (root docker-compose.yml):
#   - image: thay vì build: (CI đã push GHCR)
#   - volumes mount ra host (EBS) cho mariadb/qdrant/redis → data sống qua recreate
#   - env_file: backend/.env (KHÔNG commit, fill từ deployment/env/.env.prod.aws.example)
#   - restart: always
#   - KHÔNG publish port DB ra host (chỉ internal + Nginx proxy)
# Usage: docker compose -f docker-compose.prod.yml up -d
# Thay ghcr.io/nmcuong08 bằng path GHCR thật
# ============================================================================

x-image-base: &img
  restart: always
  networks: [legal-net]

services:
  redis:
    <<: *img
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data

  mariadb:
    <<: *img
    image: mariadb:11
    environment:
      MYSQL_DATABASE: legal_db
      MYSQL_USER: legal
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
    volumes:
      - ./data/mariadb:/var/lib/mysql

  qdrant:
    <<: *img
    image: qdrant/qdrant:v1.11.3
    volumes:
      - ./data/qdrant:/qdrant/storage

  neo4j:
    <<: *img
    image: neo4j:5.20
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-none}
    volumes:
      - ./data/neo4j:/data
    profiles: ["graph"]   # opt-in: docker compose --profile graph up

  backend:
    <<: *img
    image: ghcr.io/nmcuong08/legal-backend:latest
    env_file: backend/.env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: ${DATABASE_URL}
    depends_on: [redis, mariadb, qdrant]
    ports:
      - "127.0.0.1:8000:8000"   # chỉ localhost, Nginx proxy ra 443

  worker:
    <<: *img
    image: ghcr.io/nmcuong08/legal-worker:latest
    env_file: backend/.env
    environment:
      QDRANT_URL: http://qdrant:6333
      CELERY_WORKER_CONCURRENCY: 2
      CELERY_LOGLEVEL: info
    depends_on: [redis, mariadb, qdrant]

  frontend:
    <<: *img
    image: ghcr.io/nmcuong08/legal-frontend:latest
    ports:
      - "127.0.0.1:8501:8501"   # chỉ localhost, Nginx proxy
    depends_on: [backend]

  prometheus:
    <<: *img
    image: prom/prometheus:v2.45.0
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    <<: *img
    image: grafana/grafana:10.0.3
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?set in .env}
      - GF_SERVER_ROOT_URL=/grafana/        # served under /grafana/ by host nginx
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./data/grafana:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"   # Nginx proxy grafana.yourdomain.com
    depends_on: [prometheus]

  # --- Embedding serving (BGE-M3 on CPU) -------------------------------------
  # Backend calls http://embed-serving:5000/embed. Model downloaded to a
  # persistent EBS volume on first boot (~2.2GB from HuggingFace, public, no
  # token needed). Until the model finishes loading, /health returns 503 and
  # backend falls back to its local SentenceTransformer (see custom_embedding.py).
  embed-serving:
    <<: *img
    image: ghcr.io/nmcuong08/legal-embed-serving:latest
    environment:
      MODEL_PATH: /app/models
      API_HOST: 0.0.0.0
      API_PORT: "5000"
      MAX_BATCH_SIZE: "32"
      # HF_TOKEN optional (BGE-M3 is public) — set only to raise rate limits.
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ./data/embed-models:/app/models
    ports:
      - "127.0.0.1:5001:5000"   # host nginx proxies /embed-api/ here for data-processing clients
    # BGE-M3 download on first boot handled by entrypoint.sh (Dockerfile CMD).

  # --- OpenTelemetry collector (receives OTLP from backend) ------------------
  # Backend exports when OTEL_BRIDGE_ENABLED=true (env template sets it).
  # Exposes 8888 metrics (prometheus scrapes this) + stdout traces for debug.
  otel-collector:
    <<: *img
    image: otel/opentelemetry-collector-contrib:0.103.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./monitoring/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:8888:8888"   # collector self-metrics (prometheus scrapes this)

  # --- Alertmanager (routes Prometheus alerts to SNS / webhook) -------------
  alertmanager:
    <<: *img
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "127.0.0.1:9093:9093"

networks:
  legal-net:
    driver: bridge