# ============================================================================
# Host nginx reverse proxy for the Legal Chatbot (single-EC2, compose backend)
# ----------------------------------------------------------------------------
# Installed by user_data.sh (apt nginx + certbot). Compose services bind
# 127.0.0.1 only; this proxy exposes 80/443 to the internet.
#   /          -> frontend (Streamlit)   127.0.0.1:8501
#   /api/      -> backend  (FastAPI)     127.0.0.1:8000
#   /grafana/  -> grafana               127.0.0.1:3000
#   /prometheus/ -> prometheus          127.0.0.1:9090
#
# Canary: split_clients routes 5% of requests to backend_canary (127.0.0.1:8001)
# when a canary container is running. Override per-request with header
# X-Canary: true (force canary) / false (force stable). Promote canary -> stable
# by repointing backend_stable to the new image + reload nginx.
#
# TLS: certbot provisions certs when ROUTE53_DOMAIN is set. Until then :80
# serves plain HTTP. certbot --nginx rewrites this file to add the :443 block.
# ----------------------------------------------------------------------------
# Install: cp this to /etc/nginx/sites-available/legal.conf
#          ln -s /etc/nginx/sites-available/legal.conf /etc/nginx/sites-enabled/
#          rm -f /etc/nginx/sites-enabled/default
#          nginx -t && systemctl reload nginx
# ============================================================================

# --- Canary traffic split -------------------------------------------------
# 5% -> canary (when backend_canary is up). Bump to 100 to full-promote.
split_clients "${request_id}${remote_addr}" $backend_pool {
    5%  "backend_canary";
    *  "backend_stable";
}

upstream backend_stable {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream backend_canary {
    # Canary container (compose profile "canary") listens on 8001.
    # When no canary is running, requests here 502 -> override header to stable.
    server 127.0.0.1:8001;
    keepalive 8;
}

# Map X-Canary header so clients/tests can force a pool regardless of split.
map $http_x_canary $backend_target {
    default $backend_pool;
    "true"  "backend_canary";
    "false" "backend_stable";
}

# --- HTTP :80 (plain, until certbot upgrades to TLS) -----------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # certbot will insert the :443 server block + redirect here when TLS is on.
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    # --- Frontend (Streamlit) at root -------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;   # Streamlit websocket is long-lived
        proxy_buffering off;
    }

    # --- Backend API (FastAPI) under /api/ --------------------------------
    # Strip /api prefix so FastAPI sees its real routes.
    location /api/ {
        proxy_pass http://$backend_target/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Canary-Route $backend_target;
        proxy_read_timeout 300;
    }

    # Prometheus metrics of backend (scraped internally; also expose for ops).
    location = /metrics {
        proxy_pass http://127.0.0.1:8000/metrics;
    }

    # --- Grafana under /grafana/ -----------------------------------------
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Prometheus under /prometheus/ (ops only; restrict by IP in prod) -
    location /prometheus/ {
        # Prod: replace with allow <YOUR_IP>/32; deny all;
        proxy_pass http://127.0.0.1:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Embedding serving API (data-processing clients) ------------------
    # Exposes embed-serving /embed + /similarity for reingest / data pipelines.
    # UNAUTHENTICATED by default — restrict by IP in prod (allow <CIDR>; deny all;)
    # or put a bearer token in front. /embed-api/embed -> embed-serving:5000/embed.
    location /embed-api/ {
        proxy_pass http://127.0.0.1:5001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300;     # BGE-M3 CPU encode can be slow on big batches
    }

    # --- Health (for ALB / external uptime checks) ------------------------
    location = /healthz {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}