name: eval-gate

# Audit 4.1 — golden-set QUALITY GATE as a blocking PR check.
#
# The offline ci.yml gate runs pytest but never scores the model, and the
# eval-live workflow only diffs a candidate vs. a *baseline* (regression) and
# runs nightly — so a PR can merge with mediocre absolute faithfulness as long
# as it did not regress. This workflow closes that hole: on PRs to main it runs
# the unified golden set through the real Groq-backed agent + judge and exits 1
# when the mean faithfulness OR answer_relevance < 0.80 (the absolute floor in
# evaluation.quality_gate). The regression diff remains the nightly job's
# concern; this is the absolute PR floor.
#
# Trigger: pull_request to main + manual. Path-filtered to backend/ so docs/
# terraform PRs do not pay the Groq cost. Concurrency cancels superseded runs.
# Requires repo secrets (GROQ_API_KEY, TAVILY_API_KEY, DATABASE_URL, REDIS_URL)
# — unavailable on fork PRs, so the job is skipped for forks (see the if guard).
on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "tests/**"
      - "data/**"
      - ".github/workflows/eval-gate.yml"
  workflow_dispatch:
    inputs:
      candidate_ref:
        description: "Git ref/branch to evaluate (defaults to current)"
        required: false

concurrency:
  group: eval-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONPATH: backend/src:.
  JUDGE_PROVIDER: groq
  JUDGE_MODEL: ${{ secrets.JUDGE_MODEL || 'llama-3.1-8b-instant' }}
  # Audit 4.1 floor — fail the build below this mean faithfulness/relevance.
  QUALITY_FLOOR: "0.80"

jobs:
  golden-quality-gate:
    # Skip on fork PRs (no access to repo secrets) — the offline ci.yml gate
    # still runs for them. Maintainer PRs get the live quality gate.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.candidate_ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev deps
        run: pip install -r backend/requirements.txt -r requirements_dev.txt

      - name: Start services (Qdrant/Neo4j/Redis)
        run: docker compose up -d

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://localhost:6333/healthz && break || sleep 5
          done

      - name: Seed legal data
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: python backend/src/import_data.py

      - name: Build unified golden set
        run: python -c "from evaluation.golden_unified import write_unified_dataset; write_unified_dataset()"

      - name: Run golden-set quality gate (exit 1 if score < ${{ env.QUALITY_FLOOR }})
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          python backend/src/evaluation/run_eval.py \
            --mode generation \
            --data-file data/golden_unified.jsonl \
            --n 100 \
            --parallel 8 \
            --quality-gate \
            --quality-floor ${{ env.QUALITY_FLOOR }} \
            --output eval_reports/gate/$(date -u +%Y%m%d-%H%M%S)

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-gate-reports
          path: eval_reports/

      - name: Open issue on gate failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `eval-gate quality floor missed: ${context.runId}`,
              body: `Golden-set quality gate FAILED (mean faithfulness or answer_relevance < ${{ env.QUALITY_FLOOR }}). See run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['eval-failure', 'quality-gate']
            })