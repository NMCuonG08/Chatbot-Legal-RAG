# ============================================================================
# CI/CD: build + push images to GHCR + deploy to EC2 on git tag v*.*.*
# ----------------------------------------------------------------------------
# Copy to .github/workflows/deploy.yml in repo root to activate.
# GitHub Secrets (Settings → Secrets and variables → Actions):
#   AWS_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   EC2_HOST (public IP or domain), EC2_SSH_KEY (private .pem contents)
#   GHCR_PAT (classic PAT, scope write:packages)
# ============================================================================

name: Build, Push & Deploy

on:
  push:
    tags: ["v*.*.*"]      # deploy only on version tags
  workflow_dispatch:       # manual trigger from Actions tab

env:
  REGISTRY: ghcr.io
  OWNER: nmcuong08         # github username/org, lowercase

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

      - name: Build & push backend
        run: |
          docker build -f backend/Dockerfile -t $REGISTRY/$OWNER/legal-backend:${{ github.sha }} -t $REGISTRY/$OWNER/legal-backend:latest ./backend
          docker push --all-tags $REGISTRY/$OWNER/legal-backend

      - name: Build & push worker
        run: |
          docker build -f backend/worker.Dockerfile -t $REGISTRY/$OWNER/legal-worker:${{ github.sha }} -t $REGISTRY/$OWNER/legal-worker:latest ./backend
          docker push --all-tags $REGISTRY/$OWNER/legal-worker

      - name: Build & push frontend
        run: |
          docker build -f frontend/Dockerfile -t $REGISTRY/$OWNER/legal-frontend:${{ github.sha }} -t $REGISTRY/$OWNER/legal-frontend:latest ./frontend
          docker push --all-tags $REGISTRY/$OWNER/legal-frontend

      - name: Build & push embed-serving
        run: |
          docker build -f embed_serving/Dockerfile.cpu-serving -t $REGISTRY/$OWNER/legal-embed-serving:${{ github.sha }} -t $REGISTRY/$OWNER/legal-embed-serving:latest ./embed_serving
          docker push --all-tags $REGISTRY/$OWNER/legal-embed-serving

  eval-gate:
    needs: build-push
    runs-on: ubuntu-latest
    # Offline test gate before deploy. Live eval optional (add GROQ_API_KEY + scripts/dev.sh eval).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install + test
        continue-on-error: true   # advisory: tests need DB/Qdrant/Groq not in CI; don't block deploy
        run: |
          pip install -r backend/requirements.txt -r requirements_dev.txt
          PYTHONPATH=backend/src:. pytest -q

  deploy:
    needs: eval-gate
    runs-on: ubuntu-latest
    # Skip until you're ready to ship to EC2. Set repo variable ENABLE_DEPLOY=true
    # (Settings → Secrets and variables → Actions → Variables) + add EC2_HOST /
    # EC2_SSH_KEY secrets, then this job runs. Until then: build-push only,
    # images land in GHCR, deploy is a clean skip (not a red failure).
    if: vars.ENABLE_DEPLOY == 'true'
    steps:
      - name: SSH deploy to EC2 (assemble .env from secrets + pull + recreate)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/app
            # Refresh repo so env templates + latest code are present (the clone
            # from user_data at first boot may be stale). backend/.env + data/
            # are gitignored -> pull won't conflict with runtime state.
            git pull --ff-only origin main
            # Assemble backend/.env from template + GitHub secrets (idempotent:
            # re-runs overwrite secrets with latest values, keep non-secret config from template).
            cp -f deployment/env/.env.prod.aws.example backend/.env
            sed -i "s|^GROQ_API_KEY=.*|GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}|"           backend/.env
            sed -i "s|^TAVILY_API_KEY=.*|TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}|"       backend/.env
            sed -i "s|^COHERE_API_KEY=.*|COHERE_API_KEY=${{ secrets.COHERE_API_KEY }}|"       backend/.env
            sed -i "s|^MYSQL_PASSWORD=.*|MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}|"       backend/.env
            sed -i "s|^MYSQL_ROOT_PASSWORD=.*|MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}|" backend/.env
            sed -i "s|^DATABASE_URL=.*|DATABASE_URL=mysql+pymysql://legal:${{ secrets.MYSQL_PASSWORD }}@mariadb:3306/legal_db|" backend/.env
            sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${{ secrets.JWT_SECRET }}|"                   backend/.env
            sed -i "s|^SEED_ADMIN_PASSWORD=.*|SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}|" backend/.env
            sed -i "s|^MCP_API_KEY=.*|MCP_API_KEY=${{ secrets.MCP_API_KEY }}|"                 backend/.env
            sed -i "s|^GF_SECURITY_ADMIN_PASSWORD=.*|GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}|" backend/.env
            # Optional secrets — empty is fine (HF_TOKEN: BGE-M3 is public; ALERT_WEBHOOK_URL: alerts go nowhere until set).
            sed -i "s|^HF_TOKEN=.*|HF_TOKEN=${{ secrets.HF_TOKEN }}|"                                   backend/.env
            sed -i "s|^ALERT_WEBHOOK_URL=.*|ALERT_WEBHOOK_URL=${{ secrets.ALERT_WEBHOOK_URL }}|"       backend/.env
            chmod 600 backend/.env
            echo "${{ secrets.GHCR_PAT }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin
            # prod compose = image-based. --env-file for ${MYSQL_PASSWORD} interpolation.
            # --project-directory . -> ./data volumes resolve to /home/ubuntu/app/data.
            docker compose -f deployment/docker-compose.prod.yml --env-file backend/.env --project-directory . pull
            docker compose -f deployment/docker-compose.prod.yml --env-file backend/.env --project-directory . up -d --no-build
            docker image prune -f
            # Template the alertmanager webhook URL into the mounted config, then
            # reload host nginx so the new /api, /grafana, /prometheus routes apply.
            if [ -n "${{ secrets.ALERT_WEBHOOK_URL }}" ]; then
              sed -i "s|http://127.0.0.1:9999/alert|${{ secrets.ALERT_WEBHOOK_URL }}|g" \
                monitoring/alertmanager/alertmanager.yml 2>/dev/null || true
              docker compose -f deployment/docker-compose.prod.yml restart alertmanager || true
            fi
            nginx -t && systemctl reload nginx || echo "[deploy] nginx reload skipped (config not ready)"

      - name: Rollback hint on failure
        if: failure()
        run: |
          echo "DEPLOY FAILED. Prod still on previous image until successful pull+up."
          echo "Manual rollback: ssh in, docker pull <old-sha>, docker compose up -d --no-build"