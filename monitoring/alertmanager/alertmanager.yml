# ============================================================================
# Alertmanager — routes Prometheus alerts to a webhook (Slack/Teams/Discord)
# and optionally AWS SNS.
# ----------------------------------------------------------------------------
# Mounted by docker-compose.prod.yml alertmanager service at
# /etc/alertmanager/alertmanager.yml.
#
# Alertmanager does NOT do ${ENV} substitution in this file, so the webhook URL
# and SNS topic ARN are templated at deploy time (see deploy.yml) or edited by
# hand. For a quick test, point ALERT_WEBHOOK_URL at a Slack/Discord incoming
# webhook. SNS is commented — enable by uncommenting + templating creds.
# ============================================================================
global:
  resolve_timeout: 5m

route:
  receiver: webhook-default
  group_by: ["alertname", "job", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: ["severity=critical"]
      receiver: webhook-critical
      group_wait: 10s
      repeat_interval: 1h
    # Audit 4.2 — hallucination/rejection alert pages on-call via Telegram +
    # Slack. Routed ahead of the default so it is never lost in the generic
    # webhook bucket. Falls back to webhook-default if the chat receivers are
    # not enabled (commented below).
    - matchers: ["alertname=LegalHighVerifyRejection"]
      receiver: verify-rejection
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: webhook-default
    webhook_configs:
      - url: "http://127.0.0.1:9999/alert"   # placeholder — template at deploy
        send_resolved: true

  - name: webhook-critical
    webhook_configs:
      - url: "http://127.0.0.1:9999/alert-critical"
        send_resolved: true

  # --- Audit 4.2: hallucination/rejection paging (Telegram + Slack) -------
  # LegalHighVerifyRejection routes here. Both receivers are commented because
  # their credentials are secrets — enable by uncommenting and templating at
  # deploy time (Alertmanager does NOT do ${ENV} substitution in this file; see
  # deploy.yml / docker-compose env injection). NEVER commit real tokens.
  #
  # Telegram: set TG_BOT_TOKEN + TG_CHAT_ID out-of-band; the token is a secret.
  # - name: verify-rejection
  #   telegram_configs:
  #     - api_url: "https://api.telegram.org"
  #       bot_token: "REPLACE_TG_BOT_TOKEN"      # secret — inject at deploy
  #       chat_id: REPLACE_TG_CHAT_ID            # numeric chat id
  #       send_resolved: true
  #       parse_mode: "Markdown"
  #       message: '{{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}'
  #
  # Slack: incoming webhook URL is a secret — inject at deploy.
  # - name: verify-rejection-slack
  #   slack_configs:
  #     - api_url: "REPLACE_SLACK_WEBHOOK_URL"   # secret — inject at deploy
  #       channel: "#llmops-alerts"
  #       send_resolved: true
  #       title: '{{ .CommonAnnotations.summary }}'
  #       text: '{{ .CommonAnnotations.description }}'
  #
  # To activate, uncomment one of the blocks above and rename the route's
  # receiver to match. Until then the alert still fires in Prometheus and lands
  # in webhook-default.

  # --- AWS SNS (advanced) -------------------------------------------------
  # Uncomment + template AWS creds + topic ARN at deploy time. Requires the
  # EC2 role or static creds to have sns:Publish on ALERT_SNS_TOPIC_ARN.
  # - name: sns
  #   sns_configs:
  #     - api_url: "https://sns.ap-southeast-1.amazonaws.com"
  #       sigv4:
  #         region: "ap-southeast-1"
  #         access_key: "REPLACE_AWS_ACCESS_KEY_ID"
  #         secret_key: "REPLACE_AWS_SECRET_ACCESS_KEY"
  #       topic_arn: "REPLACE_ALERT_SNS_TOPIC_ARN"
  #       send_resolved: true

inhibit_rules:
  # If the instance is down, suppress any other alert from that instance.
  - source_matchers: ["alertname=InstanceDown"]
    target_matchers: ["alertname=~.*"]
    equal: ["job"]