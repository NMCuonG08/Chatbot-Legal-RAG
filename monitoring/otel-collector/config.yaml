# ============================================================================
# OpenTelemetry Collector — receives OTLP from backend, exposes Prometheus.
# ----------------------------------------------------------------------------
# Mounted by docker-compose.prod.yml otel-collector service at
# /etc/otelcol/config.yaml. Backend exports here when OTEL_BRIDGE_ENABLED=true
# and OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318.
#
# Pipeline: otlp (grpc 4317 / http 4318) -> batch -> prometheus (8888) + debug.
# Traces are logged to stdout for now (swap the debug exporter for jaeger/otlp
# to a tracing backend when you stand one up).
# ============================================================================
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
  # Drop high-cardinality span attributes that blow up Prometheus series.
  attributes/drop:
    actions:
      - key: http.request.header.authorization
        action: delete
      - key: http.request.header.cookie
        action: delete

exporters:
  # Scraped by Prometheus (job "otel-collector" on :8888).
  prometheus:
    endpoint: 0.0.0.0:8888
    namespace: legal
    send_timestamps: true
    metric_expiration: 5m
    resource_to_telemetry_conversion:
      enabled: true
  # Traces -> stdout for debug. Replace with jaeger/otlphttp when ready.
  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch, attributes/drop]
      exporters: [prometheus]