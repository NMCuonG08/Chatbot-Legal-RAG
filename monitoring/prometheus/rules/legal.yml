# ============================================================================
# Prometheus alert rules — Legal Chatbot
# ----------------------------------------------------------------------------
# Loaded via prometheus.yml rule_files. Mounted at /etc/prometheus/rules by
# docker-compose.prod.yml. Labels feed Alertmanager routing (severity=critical
# -> webhook-critical).
# ============================================================================

groups:
  - name: legal-services
    interval: 30s
    rules:
      # --- Availability ----------------------------------------------------
      - alert: LegalBackendDown
        expr: up{job="fastapi"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Legal backend down"
          description: "backend (FastAPI) has been unreachable for 2m on {{ $labels.instance }}."

      - alert: OtelCollectorDown
        expr: up{job="otel-collector"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OTEL collector down"
          description: "Traces/metrics are no longer being collected."

      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Alertmanager down"
          description: "Alerts cannot be delivered until Alertmanager recovers."

      # --- Backend error rate ---------------------------------------------
      - alert: LegalBackendHigh5xx
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
          / sum(rate(http_requests_total[5m])) by (job) > 0.05
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Backend 5xx error rate > 5%"
          description: "10-min 5xx ratio is {{ $value | humanizePercentage }}."

      # --- Latency ---------------------------------------------------------
      - alert: LegalBackendHighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Backend p95 latency > 2s"
          description: "p95 = {{ $value | humanizeDuration }} over the last 10m."

      # --- LLMOps / hallucination (Audit 4.2) ------------------------------
      # verify_answer judges every final answer for citation groundedness.
      # A verdict of partial/unsupported is a "rejection" (likely hallucination
      # or ungrounded answer). Alert when the 15-min rejection rate exceeds 15%,
      # sustained for 15m — a sustained high rejection rate means the model is
      # systematically producing ungrounded answers and needs human review.
      # Guarded against low-traffic division: clamp_min avoids a 0/0 NaN, and the
      # `and ... > 0` clause keeps it silent when no judgments are happening.
      - alert: LegalHighVerifyRejection
        expr: |
          (sum(rate(verify_rejection_total[15m]))
            / clamp_min(sum(rate(verify_judged_total[15m])), 1e-9)) > 0.15
          and sum(rate(verify_judged_total[15m])) > 0
        for: 15m
        labels:
          severity: high
        annotations:
          summary: "verify_answer rejection rate > 15%"
          description: "15-min hallucination/rejection ratio is {{ $value | humanizePercentage }} — sustained for 15m. Review judge threshold or retrieval grounding."